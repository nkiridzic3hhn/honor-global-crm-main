<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Honor Global · Workforce Cost & Savings</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0f1115;--panel:#171a21;--panel2:#1d212b;--line:#262b36;--ink:#e8eaf0;--mut:#969cab;--mut2:#6b7280;
    --accent:#5b8def;--green:#2bbf7a;--amber:#e0a82e;--red:#e5556e;--violet:#9b6dff;--cyan:#36c2d6}
  html,body{margin:0;padding:0;min-height:100%}
  body{background:var(--bg);color:var(--ink);font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh}
  #app{min-height:100vh;display:flex;flex-direction:column}
  *{box-sizing:border-box}
  .top{display:flex;align-items:center;gap:14px;padding:16px 28px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#13161d,#0f1115);position:sticky;top:0;z-index:30}
  .logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--accent),var(--violet));display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;color:#fff;letter-spacing:-.5px}
  .ttl{font-weight:700;font-size:16px;letter-spacing:-.3px}
  .sub{font-size:11.5px;color:var(--mut)}
  .spacer{flex:1}
  .sync{font-size:11px;color:var(--mut)}
  .btn{background:var(--panel2);border:1px solid var(--line);color:var(--ink);padding:8px 13px;border-radius:9px;font-size:12.5px;font-weight:600;cursor:pointer}
  .btn:hover{border-color:var(--accent)}
  .btn.pri{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn.sm{padding:5px 9px;font-size:11.5px}
  .tabs{display:flex;gap:4px;padding:10px 28px 0;border-bottom:1px solid var(--line);background:var(--panel);position:sticky;top:67px;z-index:29}
  .tab{padding:9px 16px;font-size:13px;font-weight:600;color:var(--mut);cursor:pointer;border-bottom:2px solid transparent;border-radius:7px 7px 0 0}
  .tab:hover{color:var(--ink)}
  .tab.on{color:var(--ink);border-bottom-color:var(--accent);background:var(--panel2)}
  .body{padding:26px 28px 60px;width:100%;max-width:1180px;margin:0 auto;flex:1}
  .grid{display:grid;gap:14px}
  .kpis{grid-template-columns:repeat(5,1fr)}.savings{grid-template-columns:repeat(4,1fr)}
  @media(max-width:760px){.kpis{grid-template-columns:repeat(2,1fr)}.savings{grid-template-columns:1fr 1fr}}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:15px 16px}
  .lab{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--mut);font-weight:600}
  .big{font-size:24px;font-weight:800;letter-spacing:-.6px;margin-top:7px}
  .meta{font-size:11.5px;color:var(--mut);margin-top:5px}
  .sec{font-size:13px;font-weight:700;margin:22px 2px 10px}
  .sav{border-top:3px solid var(--line)}.sav.av{border-top-color:var(--green)}.sav.dom{border-top-color:var(--cyan)}.sav.tp{border-top-color:var(--violet)}.sav.co{border-top-color:var(--red)}
  .up{color:var(--red)}.dn{color:var(--green)}
  table{width:100%;border-collapse:collapse;font-size:12.5px}
  th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--mut);font-weight:600;padding:9px 10px;border-bottom:1px solid var(--line)}
  td{padding:9px 10px;border-bottom:1px solid var(--line)}
  tr:hover td{background:#141821}
  select,input,textarea{background:var(--panel2);border:1px solid var(--line);color:var(--ink);border-radius:7px;padding:6px 8px;font-size:12px;font-family:inherit;width:100%}
  select:focus,input:focus,textarea:focus{outline:none;border-color:var(--accent)}
  .chips{display:flex;gap:7px;flex-wrap:wrap;margin:14px 0}
  .chip{padding:6px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;background:var(--panel2);border:1px solid var(--line);color:var(--mut)}
  .chip.on{color:#fff;background:var(--accent);border-color:var(--accent)}
  .bdg{font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px}
  .bdg.pending{background:#3a300f;color:var(--amber)}.bdg.avoided_cost{background:#0e3325;color:#6ee7b0}
  .bdg.domestic_replacement{background:#0c2e34;color:#7fe3f0}.bdg.third_party_replacement{background:#241640;color:#c4a8ff}.bdg.cost{background:#3a141d;color:#ff9bac}
  .drawer{margin-top:8px;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:14px}
  .frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:10px}
  .frow label{display:block;font-size:11px;color:var(--mut);margin-bottom:4px;font-weight:600}
  .note{background:#12161f;border:1px dashed var(--line);border-radius:9px;padding:11px 13px;font-size:12px;color:var(--mut);line-height:1.55}
  .li{display:flex;justify-content:space-between;gap:10px;padding:6px 0;border-bottom:1px solid var(--line);font-size:12.5px}
  .li:last-child{border-bottom:0}
  .empty{padding:34px;text-align:center;color:var(--mut)}
  .toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:#222838;border:1px solid var(--accent);color:#fff;padding:10px 16px;border-radius:9px;font-size:12.5px;z-index:50;opacity:0;transition:.25s}
  .toast.show{opacity:1}
</style>
</head>
<body>
<div id="app"></div>
<script>
const $=(s,r=document)=>r.querySelector(s);
const F=n=>'$'+(Number(n)||0).toLocaleString('en-US',{maximumFractionDigits:0});
const F2=n=>'$'+(Number(n)||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const api=(p,o)=>fetch('/api'+p,o).then(r=>r.json());
const BUCKETS={pending:'Pending',avoided_cost:'Avoided Cost',domestic_replacement:'Domestic Replacement',third_party_replacement:'3rd Party Replacement',cost:'Cost'};

let roster=[],payroll=[],settings={hours_per_week:40,days_per_week:5,weeks_per_year:52};
let tab='overview',filter='all',openRow=null,fAgency='all',fSup='all';

async function boot(){ await refresh(); render(); }
async function refresh(){
  [roster,payroll,settings]=await Promise.all([api('/roster'),api('/payroll'),api('/settings')]);
}

const annual=e=>(Number(e.pay_rate)||0)*settings.hours_per_week*settings.weeks_per_year;
const weekly=e=>(Number(e.pay_rate)||0)*settings.hours_per_week;
const saving=e=>['avoided_cost','domestic_replacement','third_party_replacement'].includes(e.bucket)?(Number(e.annual_saving)||0):0;
function totals(){const w=roster.reduce((a,e)=>a+weekly(e),0);return{weekly:w,daily:w/(settings.days_per_week||5),annual:w*settings.weeks_per_year,head:roster.length};}
function bucketTotals(){const t={avoided_cost:0,domestic_replacement:0,third_party_replacement:0,cost:0,pending:0};
  roster.forEach(e=>{const b=e.bucket||'pending';if(b==='cost')t.cost+=annual(e);else if(b==='pending')t.pending++;else t[b]+=saving(e);});return t;}
const countB=b=>roster.filter(e=>(e.bucket||'pending')===b).length;

// Unique sorted lists for filter dropdowns
const uniq=(key)=>[...new Set(roster.map(e=>e[key]).filter(Boolean))].sort((a,b)=>a.localeCompare(b));
// Per-agency rollup: weekly cost, annual cost, annual savings, headcount
function agencyRollup(){
  const m={};
  roster.forEach(e=>{
    const a=e.agency||'(no agency)';
    if(!m[a])m[a]={agency:a,head:0,weekly:0,annual:0,savings:0};
    m[a].head++; m[a].weekly+=weekly(e); m[a].annual+=annual(e); m[a].savings+=saving(e);
  });
  return Object.values(m).sort((x,y)=>y.annual-x.annual);
}

function render(){
  $('#app').innerHTML=`
    <div class="top"><div class="logo">HG</div>
      <div><div class="ttl">Honor Global · Workforce Cost & Savings</div><div class="sub">Live from ClickUp</div></div>
      <div class="spacer"></div><div class="sync" id="syncTxt"></div>
      <button class="btn" id="syncBtn">⟳ Sync now</button></div>
    <div class="tabs">${['overview|Overview','buckets|Buckets & Savings','payroll|Payroll','settings|Settings'].map(x=>{const[k,l]=x.split('|');return `<div class="tab ${tab===k?'on':''}" data-tab="${k}">${l}</div>`}).join('')}</div>
    <div class="body" id="body"></div>`;
  $('#syncBtn').onclick=async()=>{$('#syncBtn').textContent='⟳ Syncing…';await api('/sync',{method:'POST'});await refresh();render();toast('Synced from ClickUp');};
  document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{tab=t.dataset.tab;openRow=null;render();});
  ({overview:ovw,buckets:bks,payroll:pay,settings:sett}[tab])();
  api('/sync/status').then(s=>{if($('#syncTxt')&&s.lastSync)$('#syncTxt').textContent='● Live · '+roster.length+' active';});
}

function ovw(){
  const t=totals(),bt=bucketTotals(),totalSav=bt.avoided_cost+bt.domestic_replacement+bt.third_party_replacement;
  const last=payroll[payroll.length-1],prev=payroll[payroll.length-2];
  const d=last&&prev?Number(last.total)-Number(prev.total):null;
  $('#body').innerHTML=`
    <div class="grid kpis">
      <div class="card"><div class="lab">Daily Cost</div><div class="big">${F(t.daily)}</div><div class="meta">${settings.days_per_week}-day basis</div></div>
      <div class="card"><div class="lab">Weekly Cost</div><div class="big">${F(t.weekly)}</div><div class="meta">${settings.hours_per_week} hrs/wk</div></div>
      <div class="card"><div class="lab">Annual Cost</div><div class="big">${F(t.annual)}</div><div class="meta">run-rate</div></div>
      <div class="card"><div class="lab">Active Headcount</div><div class="big">${t.head}</div><div class="meta">live from ClickUp</div></div>
      <div class="card"><div class="lab">Pending</div><div class="big" style="color:${bt.pending?'var(--amber)':'var(--green)'}">${bt.pending}</div><div class="meta">${bt.pending?'need classifying':'all set'}</div></div>
    </div>
    <div class="sec">Annualized Savings by Category</div>
    <div class="grid savings">
      ${sc('av','Avoided Cost',bt.avoided_cost,countB('avoided_cost'))}
      ${sc('dom','Domestic Replacement',bt.domestic_replacement,countB('domestic_replacement'))}
      ${sc('tp','3rd Party Replacement',bt.third_party_replacement,countB('third_party_replacement'))}
      ${sc('co','Cost (net new)',bt.cost,countB('cost'),true)}
    </div>
    <div class="card" style="margin-top:14px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px">
      <div><div class="lab">Total Annualized Savings</div><div class="big dn">${F(totalSav)}</div></div></div>
    ${agencySection()}
    <div class="sec">Most Recent Posted Payroll</div>
    ${last?`<div class="card"><div class="lab">Week ending ${last.week_ending}</div><div class="big">${F2(last.total)}</div>
      ${d!=null?`<div class="meta">vs ${prev.week_ending}: <b class="${d>0?'up':'dn'}">${d>0?'▲ +':'▼ '}${F2(Math.abs(d))}</b></div>`:'<div class="meta">no prior week</div>'}
      <div style="margin-top:12px">${(last.items||[]).map(i=>`<div class="li"><span>${i.name}${i.notes?` · <span style="color:var(--mut2)">${i.notes}</span>`:''}</span><b>${F2(i.amount)}</b></div>`).join('')}</div></div>`
      :`<div class="empty">No payroll posted yet.</div>`}`;
}
function sc(c,l,v,n,cost){return `<div class="card sav ${c}"><div class="lab">${l}</div><div class="big" style="color:${cost?'var(--red)':'var(--ink)'}">${F(v)}</div><div class="meta">${n} ${n===1?'person':'people'}</div></div>`;}

function agencySection(){
  const rows=agencyRollup();
  if(!rows.length) return '';
  const maxAnnual=Math.max(...rows.map(r=>r.annual),1);
  // SVG horizontal bar chart: annual cost (blue) with savings (green) overlaid as a marker
  const barH=26, gap=10, padL=150, padR=70, w=760, h=rows.length*(barH+gap)+12;
  const bars=rows.map((r,i)=>{
    const y=i*(barH+gap)+6;
    const bw=(r.annual/maxAnnual)*(w-padL-padR);
    const sw=(r.savings/maxAnnual)*(w-padL-padR);
    return `
      <text x="${padL-8}" y="${y+barH/2+4}" text-anchor="end" font-size="11" fill="var(--mut)">${escSvg(r.agency)}</text>
      <rect x="${padL}" y="${y}" width="${bw}" height="${barH}" rx="4" fill="var(--accent)" opacity="0.85"></rect>
      ${r.savings>0?`<rect x="${padL}" y="${y+barH-5}" width="${sw}" height="5" rx="2" fill="var(--green)"></rect>`:''}
      <text x="${padL+bw+6}" y="${y+barH/2+4}" font-size="10.5" fill="var(--ink)">${F(r.annual)}</text>`;
  }).join('');
  const chart=`<svg viewBox="0 0 ${w} ${h}" width="100%" style="max-width:${w}px">
    ${bars}
  </svg>
  <div class="meta" style="margin-top:6px"><span style="color:var(--accent)">■</span> annual cost &nbsp; <span style="color:var(--green)">■</span> annual savings (green strip)</div>`;

  const table=`<table><thead><tr><th>Agency</th><th>People</th><th>Weekly Cost</th><th>Annual Cost</th><th>Annual Savings</th></tr></thead>
    <tbody>${rows.map(r=>`<tr><td><b>${r.agency}</b></td><td>${r.head}</td><td>${F2(r.weekly)}</td><td>${F(r.annual)}</td><td class="${r.savings>0?'dn':''}">${r.savings>0?'+'+F(r.savings):'—'}</td></tr>`).join('')}
    <tr style="font-weight:700"><td>Total</td><td>${rows.reduce((a,r)=>a+r.head,0)}</td><td>${F2(rows.reduce((a,r)=>a+r.weekly,0))}</td><td>${F(rows.reduce((a,r)=>a+r.annual,0))}</td><td class="dn">+${F(rows.reduce((a,r)=>a+r.savings,0))}</td></tr></tbody></table>`;

  return `<div class="sec">By Agency</div>
    <div class="card" style="margin-bottom:14px">${chart}</div>
    <div class="card">${table}</div>`;
}
function escSvg(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;');}

function bks(){
  const order=['all','pending','avoided_cost','domestic_replacement','third_party_replacement','cost'];
  const list=roster.filter(e=>
    (filter==='all'||(e.bucket||'pending')===filter) &&
    (fAgency==='all'||(e.agency||'')===fAgency) &&
    (fSup==='all'||(e.supervisor||'')===fSup)
  );
  const agencies=uniq('agency'), sups=uniq('supervisor');
  $('#body').innerHTML=`
    <div class="note">Classify every active hire. New hires start <b>Pending</b>. You enter who they replaced, that cost, and the hourly + annual saving. Stored here, not in ClickUp.</div>
    <div class="chips">${order.map(k=>`<div class="chip ${filter===k?'on':''}" data-b="${k}">${k==='all'?'All':BUCKETS[k]} <span style="opacity:.7">${k==='all'?roster.length:countB(k)}</span></div>`).join('')}</div>
    <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px;align-items:flex-end">
      <div style="min-width:200px"><label style="display:block;font-size:11px;color:var(--mut);margin-bottom:4px;font-weight:600">Agency</label>
        <select id="fAgency"><option value="all">All agencies</option>${agencies.map(a=>`<option value="${escAttr(a)}" ${fAgency===a?'selected':''}>${a}</option>`).join('')}</select></div>
      <div style="min-width:200px"><label style="display:block;font-size:11px;color:var(--mut);margin-bottom:4px;font-weight:600">Supervisor</label>
        <select id="fSup"><option value="all">All supervisors</option>${sups.map(s=>`<option value="${escAttr(s)}" ${fSup===s?'selected':''}>${s}</option>`).join('')}</select></div>
      <div style="font-size:12px;color:var(--mut);padding-bottom:8px">Showing <b style="color:var(--ink)">${list.length}</b> of ${roster.length}${(fAgency!=='all'||fSup!=='all'||filter!=='all')?` · <span id="clearF" style="color:var(--accent);cursor:pointer">clear filters</span>`:''}</div>
    </div>
    <table><thead><tr><th>Name</th><th>Position</th><th>Agency</th><th>Supervisor</th><th>Rate</th><th>Annual</th><th>Bucket</th><th>Saving</th><th></th></tr></thead>
    <tbody>${list.length?list.map(row).join(''):'<tr><td colspan="9" class="empty">None.</td></tr>'}</tbody></table>`;
  document.querySelectorAll('.chip').forEach(c=>c.onclick=()=>{filter=c.dataset.b;render();});
  $('#fAgency').onchange=e=>{fAgency=e.target.value;render();};
  $('#fSup').onchange=e=>{fSup=e.target.value;render();};
  const cf=$('#clearF'); if(cf) cf.onclick=()=>{filter='all';fAgency='all';fSup='all';render();};
  bind();
}
function escAttr(s){return String(s).replace(/"/g,'&quot;');}
function row(e){
  const b=e.bucket||'pending',s=saving(e),isCost=b==='cost';
  const st=b==='pending'?'<span style="color:var(--mut2)">—</span>':isCost?`<span class="up">${F(annual(e))} cost</span>`:`<span class="dn">+${F(s)}</span>`;
  let drawer='';
  if(openRow===e.clickup_id){drawer=`<tr><td colspan="9" style="background:#10131a"><div class="drawer">
    <div class="frow"><div><label>Who they're replacing</label><input data-f="replacing_who" value="${esc(e.replacing_who)}"></div>
    <div><label>Who they replaced</label><input data-f="replaced_who" value="${esc(e.replaced_who)}"></div></div>
    <div class="frow"><div><label>That person's annual cost ($)</label><input type="number" data-f="replaced_annual_cost" value="${e.replaced_annual_cost??''}"></div>
    <div><label>Hourly saving ($/hr)</label><input type="number" step="0.01" id="hr" data-f="hourly_saving" value="${e.hourly_saving??''}"></div></div>
    <div class="frow"><div><label>Annual saving ($)</label><input type="number" id="an" data-f="annual_saving" value="${e.annual_saving??''}"></div>
    <div><label>This hire — annual run-rate</label><input value="${F(annual(e))}" disabled style="opacity:.6"></div></div>
    <div style="margin-bottom:10px"><label>Notes</label><textarea data-f="notes" rows="2">${esc(e.notes)}</textarea></div>
    <button class="btn pri sm" data-save="${e.clickup_id}">Save</button></div></td></tr>`;}
  return `<tr><td><b>${e.name}</b><div style="font-size:10.5px;color:var(--mut2)">${e.role_type||''}</div></td>
    <td>${e.position||''}</td><td>${e.agency||''}</td><td>${e.supervisor||''}</td><td>${F2(e.pay_rate)}/hr</td><td>${F(annual(e))}</td>
    <td><select data-bucket="${e.clickup_id}">${Object.keys(BUCKETS).map(k=>`<option value="${k}" ${b===k?'selected':''}>${BUCKETS[k]}</option>`).join('')}</select></td>
    <td>${st}</td><td><button class="btn sm" data-edit="${e.clickup_id}">${openRow===e.clickup_id?'Close':'Details'}</button></td></tr>${drawer}`;
}
function bind(){
  document.querySelectorAll('[data-bucket]').forEach(s=>s.onchange=async()=>{await api('/classification/'+s.dataset.bucket,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({bucket:s.value})});await refresh();render();toast('Bucket updated');});
  document.querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>{openRow=openRow===b.dataset.edit?null:b.dataset.edit;render();});
  const hr=$('#hr');if(hr)hr.oninput=()=>{const an=$('#an');if(an&&hr.value!=='')an.value=Math.round(parseFloat(hr.value)*settings.hours_per_week*settings.weeks_per_year);};
  document.querySelectorAll('[data-save]').forEach(b=>b.onclick=async()=>{
    const id=b.dataset.save,p={};document.querySelectorAll('[data-f]').forEach(i=>{p[i.dataset.f]=i.type==='number'?(parseFloat(i.value)||null):i.value;});
    await api('/classification/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(p)});openRow=null;await refresh();render();toast('Saved');});
}

function pay(){
  const rows=[...payroll].reverse(),last=payroll[payroll.length-1],prev=payroll[payroll.length-2];
  const d=last&&prev?Number(last.total)-Number(prev.total):null;
  $('#body').innerHTML=`
    <div class="grid" style="grid-template-columns:1fr 1fr">
      <div class="card"><div class="lab">Latest Week</div><div class="big">${last?F2(last.total):'—'}</div><div class="meta">${last?'ending '+last.week_ending:''}</div></div>
      <div class="card"><div class="lab">vs Prior Week</div><div class="big ${d>0?'up':'dn'}">${d!=null?(d>0?'+':'')+F2(d):'—'}</div></div></div>
    <div class="note" style="margin-top:14px">Upload finance's weekly Excel/CSV. The parser finds name/amount/notes columns automatically — we'll lock it to her exact format once you share the file.</div>
    <div class="card" style="margin-top:14px">
      <div class="frow"><div><label>Week ending</label><input type="date" id="wk"></div>
      <div><label>File (.xlsx/.csv)</label><input type="file" id="file" accept=".xlsx,.xls,.csv"></div></div>
      <button class="btn pri sm" id="up">Upload week</button></div>
    <div class="sec">Posted Weeks</div>
    ${rows.length?rows.map(w=>`<div class="card" style="margin-bottom:10px"><div style="display:flex;justify-content:space-between"><b>Week ending ${w.week_ending}</b><b>${F2(w.total)}</b></div>
      <div style="margin-top:8px">${(w.items||[]).map(i=>`<div class="li"><span>${i.name}${i.notes?` · <span style="color:var(--mut2)">${i.notes}</span>`:''}</span><span>${F2(i.amount)}</span></div>`).join('')}</div>
      <button class="btn sm" data-del="${w.week_ending}" style="margin-top:8px">Delete</button></div>`).join(''):'<div class="empty">No weeks posted.</div>'}`;
  $('#up').onclick=async()=>{const wk=$('#wk').value,f=$('#file').files[0];if(!wk||!f){toast('Pick date + file');return;}
    const fd=new FormData();fd.append('file',f);fd.append('week_ending',wk);
    const r=await fetch('/api/payroll/upload',{method:'POST',body:fd}).then(r=>r.json());
    if(r.ok){await refresh();render();toast('Posted '+r.count+' lines');}else toast('Error: '+(r.error||'failed'));};
  document.querySelectorAll('[data-del]').forEach(b=>b.onclick=async()=>{await api('/payroll/'+b.dataset.del,{method:'DELETE'});await refresh();render();});
}

function sett(){
  $('#body').innerHTML=`<div class="card" style="max-width:520px"><div class="sec" style="margin-top:0">Cost assumptions</div>
    <div class="frow"><div><label>Hours per week</label><input type="number" id="h" value="${settings.hours_per_week}"></div>
    <div><label>Days per week</label><input type="number" id="d" value="${settings.days_per_week}"></div></div>
    <div class="frow"><div><label>Weeks per year</label><input type="number" id="w" value="${settings.weeks_per_year}"></div><div></div></div>
    <button class="btn pri sm" id="s">Save</button></div>`;
  $('#s').onclick=async()=>{await api('/settings',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({hours_per_week:+$('#h').value,days_per_week:+$('#d').value,weeks_per_year:+$('#w').value})});await refresh();render();toast('Saved');};
}

function esc(s){return String(s??'').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
let tt;function toast(m){let t=$('#toast');if(!t){t=document.createElement('div');t.id='toast';t.className='toast';document.body.appendChild(t);}t.textContent=m;t.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('show'),2200);}
boot();
</script>
</body>
